_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-service:8081
    routes:
      - name: auth-routes
        paths:
          - /auth
          - /user
          - /follow
          - /admin
        strip_path: false

  - name: post-service
    url: http://post-service:8087
    routes:
      - name: post-routes
        paths:
          - /post
          - /comment
          - /likes
        strip_path: false

  - name: message-service
    url: http://message-service:8093
    routes:
      - name: message-routes
        paths:
          - /messages
          - /conversation
        strip_path: false

  - name: notification-service
    url: http://notification-service:8084
    routes:
      - name: notification-routes
        paths:
          - /notification
        strip_path: false

  - name: upload-service
    url: http://upload-service:8089
    routes:
      - name: upload-routes
        paths:
          - /upload
        strip_path: false

  - name: recomment-service
    url: http://recomment-service:8086
    routes:
      - name: recommend-routes
        paths:
          - /recommend
        strip_path: false


plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Requested-With
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 200
      hour: 5000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
