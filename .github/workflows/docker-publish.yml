name: CI - Build & Push to ACR

on:
  push:
    branches:
      - main
    paths:
      # Chỉ trigger khi code trong các thư mục service thay đổi
      - "backend/**"

  # Cho phép trigger thủ công từ GitHub UI (Actions tab → Run workflow)
  # Khi chạy thủ công: build TẤT CẢ service, bỏ qua bước detect-changes
  workflow_dispatch:
    inputs:
      force_build_all:
        description: 'Force build all services (ignore change detection)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  ACR_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  # Commit hash ngắn (7 ký tự) dùng làm image tag
  IMAGE_TAG: ${{ github.sha }}
  # true nếu trigger thủ công
  IS_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  # ============================================================
  # JOB 1: Phát hiện service nào có thay đổi code
  # ============================================================
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth-service:          ${{ steps.changes.outputs.auth-service }}
      upload-service:        ${{ steps.changes.outputs.upload-service }}
      notification-service:  ${{ steps.changes.outputs.notification-service }}
      post-service:          ${{ steps.changes.outputs.post-service }}
      message-service:       ${{ steps.changes.outputs.message-service }}
      recomment-service:     ${{ steps.changes.outputs.recomment-service }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Cần lấy 2 commit để so sánh diff

      - name: Detect changed services
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'backend/auth-service/**'
            upload-service:
              - 'backend/upload-service/**'
            notification-service:
              - 'backend/notification-service/**'
            post-service:
              - 'backend/post-service/**'
            message-service:
              - 'backend/message-service/**'
            recomment-service:
              - 'backend/recomment-service/**'

  # ============================================================
  # JOB 2: Build và Push Image lên ACR
  # Mỗi service chạy song song nhau, chỉ chạy nếu có thay đổi
  # ============================================================
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      matrix:
        include:
          - service: auth-service
            changed: ${{ needs.detect-changes.outputs.auth-service }}
          - service: upload-service
            changed: ${{ needs.detect-changes.outputs.upload-service }}
          - service: notification-service
            changed: ${{ needs.detect-changes.outputs.notification-service }}
          - service: post-service
            changed: ${{ needs.detect-changes.outputs.post-service }}
          - service: message-service
            changed: ${{ needs.detect-changes.outputs.message-service }}
          - service: recomment-service
            changed: ${{ needs.detect-changes.outputs.recomment-service }}

    # Build nếu: (service có thay đổi) HOẶC (trigger thủ công với force_build_all=true)
    if: ${{ matrix.changed == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image to ACR
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          push: true
          # Gắn 2 tag: commit hash (stable ID) và "latest" (tiện debug)
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ============================================================
  # JOB 3: Cập nhật image tag trong GitOps Repo (Private)
  # Chạy sau khi tất cả job build hoàn thành
  # ============================================================
  update-gitops:
    name: Update GitOps Repo
    runs-on: ubuntu-latest
    # Chỉ chạy nếu ít nhất 1 job build thành công (không fail, skip thì ok)
    needs: build-and-push
    if: ${{ always() && needs.build-and-push.result != 'failure' }}

    steps:
      - name: Checkout source code (để lấy danh sách service thay đổi)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services (lần 2 để dùng trong job này)
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'backend/auth-service/**'
            upload-service:
              - 'backend/upload-service/**'
            notification-service:
              - 'backend/notification-service/**'
            post-service:
              - 'backend/post-service/**'
            message-service:
              - 'backend/message-service/**'
            recomment-service:
              - 'backend/recomment-service/**'

      # Clone GitOps repo private bằng PAT token
      # PAT cần có quyền: repo (Full control of private repositories)
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: vanlailaptrinh/microservice-social-learn-gitops
          # GITOPS_PAT: Personal Access Token có quyền 'repo'
          # Tạo tại: GitHub → Settings → Developer settings → Personal access tokens
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update image tags in values-dev.yaml
        working-directory: gitops-repo
        run: |
          FILE="apps/microservice-social-learn/values-dev.yaml"
          TAG="${{ env.IMAGE_TAG }}"
          CHANGED_SERVICES=""

          # Hàm helper: cập nhật tag của 1 service trong values-dev.yaml
          # Dùng sed để tìm đúng block của service và chỉ sửa dòng tag của nó
          update_tag() {
            local service=$1
            # Tìm block "  <service>:" và thay dòng "tag:" tiếp theo trong block đó
            python3 - <<EOF
          import re

          service = "$service"
          tag = "$TAG"
          file_path = "$FILE"

          with open(file_path, 'r') as f:
              content = f.read()

          # Pattern: tìm đúng block service và thay tag của nó
          pattern = r'(' + re.escape(service) + r':.*?image:.*?tag:\s*)(\S+)'
          replacement = r'\g<1>' + tag
          new_content = re.sub(pattern, replacement, content, count=1, flags=re.DOTALL)

          with open(file_path, 'w') as f:
              f.write(new_content)

          print(f"Updated {service} tag to {tag}")
          EOF
          }

          # Cập nhật từng service nếu có thay đổi
          if [ "${{ steps.changes.outputs.auth-service }}" == "true" ]; then
            update_tag "auth-service"
            CHANGED_SERVICES="$CHANGED_SERVICES auth-service"
          fi
          if [ "${{ steps.changes.outputs.upload-service }}" == "true" ]; then
            update_tag "upload-service"
            CHANGED_SERVICES="$CHANGED_SERVICES upload-service"
          fi
          if [ "${{ steps.changes.outputs.notification-service }}" == "true" ]; then
            update_tag "notification-service"
            CHANGED_SERVICES="$CHANGED_SERVICES notification-service"
          fi
          if [ "${{ steps.changes.outputs.post-service }}" == "true" ]; then
            update_tag "post-service"
            CHANGED_SERVICES="$CHANGED_SERVICES post-service"
          fi
          if [ "${{ steps.changes.outputs.message-service }}" == "true" ]; then
            update_tag "message-service"
            CHANGED_SERVICES="$CHANGED_SERVICES message-service"
          fi
          if [ "${{ steps.changes.outputs.recomment-service }}" == "true" ]; then
            update_tag "recomment-service"
            CHANGED_SERVICES="$CHANGED_SERVICES recomment-service"
          fi

          echo "CHANGED_SERVICES=$CHANGED_SERVICES" >> $GITHUB_ENV

      - name: Commit and push changes to GitOps repo
        working-directory: gitops-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add apps/microservice-social-learn/values-dev.yaml

          # Chỉ commit nếu thực sự có thay đổi
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: update image tags [${{ env.IMAGE_TAG }}]

          Services updated:${{ env.CHANGED_SERVICES }}
          Triggered by: ${{ github.actor }}
          Source commit: ${{ github.sha }}"

            git push
            echo "GitOps repo updated successfully!"
          fi
